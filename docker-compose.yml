services:
  api:
    build:
      context: .
    container_name: assetly-backend-api
    restart: unless-stopped
    environment:
      PORT: '5000'
      DATABASE_URL: sqlite:////app/instance/assets.db
      DEBUG: 'True'
      AUTO_SEED_DB: '1'
      CORS_ALLOWED_ORIGINS: null,http://localhost:5500,http://127.0.0.1:5500
    ports:
      - '5000:5000'
    volumes:
      - assetly_instance:/app/instance

volumes:
  assetly_instance:
